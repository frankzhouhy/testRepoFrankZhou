<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 300" fill="none">
  <!-- Sky gradient -->
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#4A90D9"/>
      <stop offset="100%" stop-color="#87CEEB"/>
    </linearGradient>
    <linearGradient id="glass" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#5B8EC2"/>
      <stop offset="40%" stop-color="#6FA3D4"/>
      <stop offset="100%" stop-color="#4A7BA8"/>
    </linearGradient>
    <linearGradient id="glass2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#4F82B3"/>
      <stop offset="50%" stop-color="#6298C8"/>
      <stop offset="100%" stop-color="#3D6D99"/>
    </linearGradient>
    <linearGradient id="ground" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#6B8E6B"/>
      <stop offset="100%" stop-color="#4A6B4A"/>
    </linearGradient>
  </defs>

  <!-- Sky -->
  <rect width="600" height="300" fill="url(#sky)"/>

  <!-- Clouds -->
  <ellipse cx="120" cy="60" rx="50" ry="20" fill="white" opacity="0.6"/>
  <ellipse cx="145" cy="55" rx="35" ry="15" fill="white" opacity="0.5"/>
  <ellipse cx="450" cy="45" rx="60" ry="18" fill="white" opacity="0.4"/>
  <ellipse cx="480" cy="40" rx="40" ry="14" fill="white" opacity="0.35"/>

  <!-- Background buildings -->
  <rect x="50" y="120" width="40" height="180" fill="#7A9BB5" opacity="0.4"/>
  <rect x="100" y="100" width="35" height="200" fill="#6B8DAA" opacity="0.35"/>
  <rect x="460" y="130" width="45" height="170" fill="#7A9BB5" opacity="0.4"/>
  <rect x="515" y="110" width="38" height="190" fill="#6B8DAA" opacity="0.35"/>

  <!-- Main tower (Hyatt Regency Atlanta - cylindrical tower) -->
  <!-- Left wing -->
  <rect x="180" y="80" width="100" height="220" fill="url(#glass)" rx="2"/>
  <!-- Window grid - left wing -->
  <g stroke="#3A6B8E" stroke-width="0.5" opacity="0.4">
    <line x1="200" y1="80" x2="200" y2="300"/>
    <line x1="220" y1="80" x2="220" y2="300"/>
    <line x1="240" y1="80" x2="240" y2="300"/>
    <line x1="260" y1="80" x2="260" y2="300"/>
    <line x1="180" y1="100" x2="280" y2="100"/>
    <line x1="180" y1="120" x2="280" y2="120"/>
    <line x1="180" y1="140" x2="280" y2="140"/>
    <line x1="180" y1="160" x2="280" y2="160"/>
    <line x1="180" y1="180" x2="280" y2="180"/>
    <line x1="180" y1="200" x2="280" y2="200"/>
    <line x1="180" y1="220" x2="280" y2="220"/>
    <line x1="180" y1="240" x2="280" y2="240"/>
    <line x1="180" y1="260" x2="280" y2="260"/>
    <line x1="180" y1="280" x2="280" y2="280"/>
  </g>

  <!-- Center tower (taller) -->
  <rect x="280" y="40" width="80" height="260" fill="url(#glass2)" rx="2"/>
  <!-- Revolving restaurant at top (Polaris) -->
  <ellipse cx="320" cy="52" rx="50" ry="8" fill="#3D6D99"/>
  <rect x="275" y="44" width="90" height="12" fill="#4A7BA8" rx="2"/>
  <!-- Window grid - center -->
  <g stroke="#2D5A7E" stroke-width="0.5" opacity="0.4">
    <line x1="300" y1="56" x2="300" y2="300"/>
    <line x1="320" y1="56" x2="320" y2="300"/>
    <line x1="340" y1="56" x2="340" y2="300"/>
    <line x1="280" y1="70" x2="360" y2="70"/>
    <line x1="280" y1="90" x2="360" y2="90"/>
    <line x1="280" y1="110" x2="360" y2="110"/>
    <line x1="280" y1="130" x2="360" y2="130"/>
    <line x1="280" y1="150" x2="360" y2="150"/>
    <line x1="280" y1="170" x2="360" y2="170"/>
    <line x1="280" y1="190" x2="360" y2="190"/>
    <line x1="280" y1="210" x2="360" y2="210"/>
    <line x1="280" y1="230" x2="360" y2="230"/>
    <line x1="280" y1="250" x2="360" y2="250"/>
    <line x1="280" y1="270" x2="360" y2="270"/>
    <line x1="280" y1="290" x2="360" y2="290"/>
  </g>

  <!-- Right wing -->
  <rect x="360" y="90" width="90" height="210" fill="url(#glass)" rx="2"/>
  <!-- Window grid - right wing -->
  <g stroke="#3A6B8E" stroke-width="0.5" opacity="0.4">
    <line x1="380" y1="90" x2="380" y2="300"/>
    <line x1="400" y1="90" x2="400" y2="300"/>
    <line x1="420" y1="90" x2="420" y2="300"/>
    <line x1="360" y1="110" x2="450" y2="110"/>
    <line x1="360" y1="130" x2="450" y2="130"/>
    <line x1="360" y1="150" x2="450" y2="150"/>
    <line x1="360" y1="170" x2="450" y2="170"/>
    <line x1="360" y1="190" x2="450" y2="190"/>
    <line x1="360" y1="210" x2="450" y2="210"/>
    <line x1="360" y1="230" x2="450" y2="230"/>
    <line x1="360" y1="250" x2="450" y2="250"/>
    <line x1="360" y1="270" x2="450" y2="270"/>
    <line x1="360" y1="290" x2="450" y2="290"/>
  </g>

  <!-- Entrance / lobby area -->
  <rect x="240" y="260" width="160" height="40" fill="#3A5A78" rx="3"/>
  <rect x="290" y="265" width="60" height="35" fill="#C8A96E" opacity="0.6" rx="2"/>

  <!-- Ground / landscaping -->
  <rect x="0" y="285" width="600" height="15" fill="url(#ground)"/>

  <!-- Trees -->
  <circle cx="160" cy="270" r="15" fill="#4A7A4A"/>
  <circle cx="155" cy="262" r="12" fill="#5A8A5A"/>
  <rect x="157" y="280" width="5" height="15" fill="#6B4E3D"/>

  <circle cx="470" cy="272" r="14" fill="#4A7A4A"/>
  <circle cx="466" cy="264" r="11" fill="#5A8A5A"/>
  <rect x="467" y="282" width="5" height="13" fill="#6B4E3D"/>

  <!-- Hotel name overlay -->
  <rect x="0" y="260" width="600" height="40" fill="black" opacity="0.35"/>
  <text x="300" y="286" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="600" fill="white">Hyatt Regency Atlanta</text>

  <!-- Reflection/shine on glass -->
  <rect x="285" y="56" width="8" height="200" fill="white" opacity="0.08"/>
  <rect x="195" y="80" width="6" height="180" fill="white" opacity="0.06"/>
  <rect x="375" y="90" width="6" height="170" fill="white" opacity="0.06"/>
</svg>
